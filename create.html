<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Project</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .setup-card { max-width: 500px; margin: 80px auto; background: white; border-radius: 20px; padding: 40px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #eee; background: #fcfcfc; }
        .btn-bsl { background: #ff8c00; color: white; border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; border: none; }
        .hint { font-size: 0.85rem; color: #6c757d; }
    </style>
</head>
<body class="container">
    <div class="setup-card">
        <h2 class="fw-bold mb-4 text-center">New Project</h2>
        <form id="projectForm">
            <div class="mb-3">
                <label class="small fw-bold text-muted">PROJECT NAME</label>
                <input type="text" name="name" class="form-control" placeholder="Name and Location" required>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted">TEAM EMAILS (COMMA SEPARATED)</label>
                <textarea name="email" class="form-control" rows="3" placeholder="user@gmail.com, admin@inventors.xyz" required></textarea>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted">GOOGLE DRIVE FOLDER ID (OPTIONAL)</label>
                <input type="text" name="drive_id" class="form-control" placeholder="Example: 1AbCdEfG...">
            </div>
            <p class="hint mb-4">Frontend-only mode: this saves data to your browser (localStorage).</p>
            <button type="submit" class="btn btn-bsl mb-3 shadow-sm">Save Project</button>
            <div class="text-center">
                <a href="/index.html" class="text-decoration-none text-muted small">&larr; Back to Dashboard</a>
            </div>
        </form>
    </div>

<script>
const STORAGE_KEY = "project_portal_projects";

function loadProjects() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
    } catch (e) {
        return [];
    }
}

function saveProjects(projects) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

document.getElementById("projectForm").addEventListener("submit", function (event) {
    event.preventDefault();

    const formData = new FormData(event.target);
    const name = (formData.get("name") || "").trim();
    const rawEmails = (formData.get("email") || "").trim();
    const driveId = (formData.get("drive_id") || "").trim();

    const emails = rawEmails.split(",").map(e => e.trim()).filter(Boolean);
    if (!name || !emails.length) {
        alert("Please add project name and at least one email.");
        return;
    }

    const projects = loadProjects();
    projects.unshift({ name, emails, driveId });
    saveProjects(projects);
    window.location.href = "/index.html";
});
</script>
</body>
</html>
